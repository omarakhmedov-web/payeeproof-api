services:
  - type: web
    name: payeeproof-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 8 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ALLOWED_ORIGINS
        value: https://payeeproof.com
      - key: DB_PATH
        value: /tmp/payeeproof.db
      - key: REQUEST_TIMEOUT_SEC
        value: 15
